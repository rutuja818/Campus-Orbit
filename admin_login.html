<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Orbit | Admin Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("https://sinhgadsolapur.org/public/assets/vendor/sknscoe/img/Slider/g4.png");
      background-size:cover;
      background-position:center;
      padding:20px;
    }

    .login-box{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.96);
      border-radius:20px;
      padding:32px 28px;
      box-shadow:0 18px 45px rgba(0,0,0,0.22);
      border:1px solid rgba(255,255,255,0.5);
    }

    .title{
      text-align:center;
      margin-bottom:24px;
    }

    .title h1{
      font-size:28px;
      color:#03203e;
      margin-bottom:8px;
    }

    .title p{
      color:#64748b;
      font-size:14px;
    }

    .form-group{
      margin-bottom:16px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:#0f172a;
      font-weight:600;
    }

    .form-group input{
      width:100%;
      padding:12px 14px;
      border:1px solid #d8e2ec;
      border-radius:10px;
      font-size:15px;
      outline:none;
      transition:0.3s;
    }

    .form-group input:focus{
      border-color:#0b8f87;
      box-shadow:0 0 0 3px rgba(11,143,135,0.12);
    }

    .login-btn{
      width:100%;
      border:none;
      background:#03203e;
      color:white;
      padding:13px;
      border-radius:10px;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      margin-top:6px;
    }

    .login-btn:hover{
      background:#1f55b2;
    }

    .back-btn{
      width:100%;
      border:none;
      background:#e8eef3;
      color:#03203e;
      padding:12px;
      border-radius:10px;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      margin-top:10px;
      transition:0.3s;
    }

    .back-btn:hover{
      background:#d8e4ec;
    }

    .message{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      min-height:20px;
      font-weight:600;
    }

    .error{
      color:#d7263d;
    }

    .success{
      color:#16a34a;
    }

    .small-note{
      margin-top:18px;
      text-align:center;
      font-size:12px;
      color:#94a3b8;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="title">
      <h1>Admin Login</h1>
      <p>Campus Orbit secure administrator access</p>
    </div>

    <form id="adminLoginForm">
      <div class="form-group">
        <label for="email">Admin Email</label>
        <input type="email" id="email" placeholder="Enter admin email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required />
      </div>

      <button type="submit" class="login-btn">Login</button>
      <button type="button" class="back-btn" onclick="goHome()">Back to Home</button>

      <div id="message" class="message"></div>
    </form>

    <div class="small-note">
      Authorized access only
    </div>
  </div>

  <script src="admin_login.js"></script>
</body>
</html>
