<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Campus Orbit | Approval Tracking</title>

  <style>
    :root{
      --brand:#041960;
      --brand2:#0aa39a;
      --bg:#f3f7f8;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#6b7280;
      --line:rgba(15,23,42,.08);
      --shadow2: 0 10px 22px rgba(2,6,23,.08);

      --danger:#ef4444;
      --warn:#f59e0b;
      --ok:#10b981;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .nav{
      background:var(--brand);
      color:#fff;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:10;
      box-shadow: 0 10px 25px rgba(2,6,23,.18);
    }
    .navLeft{display:flex;align-items:center;gap:10px;font-weight:900}
    .navRight{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .welcome{font-weight:900;opacity:.95}

    .navBtn{
      border:none;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:850;
      background:#fff;color:var(--brand);box-shadow: 0 6px 14px rgba(2,6,23,.10);transition:.15s;
    }
    .navBtn.secondary{
      background:rgba(255,255,255,.16);
      color:#fff;
      border:1px solid rgba(255,255,255,.20);
      box-shadow:none;
    }

    .wrap{max-width:980px;margin:0 auto;padding:26px 16px 40px;}
    .title{
      font-size:36px;font-weight:950;color:var(--brand);
      margin:10px 0 6px;letter-spacing:.2px;
    }
    .sub{margin:0 0 16px;color:var(--muted);font-weight:650}

    .tabs{
      display:flex;gap:10px;flex-wrap:wrap;
      background:#fff;border:1px solid var(--line);
      border-radius:14px;padding:10px;
      box-shadow:var(--shadow2);
      width:fit-content;
    }
    .tab{
      border:none;cursor:pointer;font-weight:950;
      border-radius:12px;padding:10px 12px;
      background:rgba(15,23,42,.06);color:#0f172a;
      transition:.12s;
    }
    .tab.active{background:var(--brand);color:#fff}

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow2);
      padding:16px 16px;
      margin-top:14px;
    }
    .row{
      display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    }
    .eventName{margin:0;font-size:22px;font-weight:950}

    .badge{
      display:inline-flex;align-items:center;gap:8px;
      padding:6px 10px;border-radius:999px;
      font-weight:900;font-size:12.5px;
    }
    .bPending{background:rgba(245,158,11,.14); color:#9a6400;}
    .bApproved{background:rgba(16,185,129,.16); color:var(--ok);}
    .bRejected{background:rgba(239,68,68,.14); color:var(--danger);}

    .meta{
      display:flex;gap:14px;flex-wrap:wrap;
      margin:10px 0 10px;color:var(--muted);font-weight:800
    }

    .info{
      margin:0;color:rgba(15,23,42,.72);font-weight:650;line-height:1.45
    }

    .empty{
      background:#fff;border:1px solid var(--line);border-radius:18px;
      box-shadow:var(--shadow2);
      padding:18px 16px;margin-top:14px;
    }
    .empty h3{margin:0 0 6px;color:var(--brand);font-weight:950}
    .empty p{margin:0;color:var(--muted);font-weight:650}
  </style>
</head>

<body>
  <header class="nav">
    <div class="navLeft"><span>🎓</span><span>Campus orbit</span></div>

    <div class="navRight">
      <div class="welcome" id="welcomeText">Welcome, staff</div>
      <button class="navBtn" id="goStaff">Add Event</button>
      <button class="navBtn" id="trackBtn">Approval Tracking</button>
      <button class="navBtn" id="goReport">Report</button>
      <button class="navBtn secondary" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="wrap">
    <div class="title">Approval Tracking</div>
    <p class="sub">Track the status of events sent for approval</p>

    <!-- ✅ IDs must match approval_tracking.js -->
    <div class="tabs">
      <button class="tab active" id="tabPending">Pending (<span id="countPending">0</span>)</button>
      <button class="tab" id="tabApproved">Approved (<span id="countApproved">0</span>)</button>
      <button class="tab" id="tabRejected">Rejected (<span id="countRejected">0</span>)</button>
    </div>

    <div id="list"></div>
  </main>

  <!-- ✅ Only API-based JS (MongoDB) -->
  <script type="module" src="approval_tracking.js"></script>

  <script>
    // ✅ Basic navbar actions + welcome
    const u = JSON.parse(localStorage.getItem("campusOrbit_currentUser_v1") || "null");
    if (u) {
      document.getElementById("welcomeText").textContent = `Welcome, ${u.role ? u.role.toLowerCase() : "user"}`;
    }

    document.getElementById("goStaff").onclick = ()=> window.location.href = "staff.html";
    document.getElementById("trackBtn").onclick = ()=> window.location.href = "approval_tracking.html";
    document.getElementById("goReport").onclick = ()=> window.location.href = "report_event.html";

    document.getElementById("logoutBtn").onclick = ()=> {
      localStorage.removeItem("campusOrbit_currentUser_v1");
      localStorage.removeItem("campusOrbit_token_v1");
      window.location.href = "login.html";
    };
  </script>
</body>
</html>
