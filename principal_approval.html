<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Campus Orbit | Principal Dashboard</title>

  <style>
    :root{
      --brand:#03203e;
      --bg:#f3f7f8;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#6b7280;
      --line:rgba(15,23,42,.08);
      --shadow2: 0 10px 22px rgba(2,6,23,.08);
      --danger:#ef4444;
      --ok:#10b981;
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .nav{
      background:var(--brand);
      color:#fff;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:10;
      box-shadow: 0 10px 25px rgba(2,6,23,.18);
    }
    .navLeft{display:flex;align-items:center;gap:10px;font-weight:900}
    .navRight{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .navBtn{
      border:none;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:850;
      background:#fff;color:var(--brand);box-shadow: 0 6px 14px rgba(2,6,23,.10);transition:.15s;
    }
    .navBtn.secondary{
      background:rgba(255,255,255,.16);
      color:#fff;
      border:1px solid rgba(255,255,255,.20);
      box-shadow:none;
    }

    .wrap{max-width:980px;margin:0 auto;padding:26px 16px 40px;}
    .title{
      font-size:36px;font-weight:950;color:var(--brand);
      margin:10px 0 6px;letter-spacing:.2px;
    }
    .sub{margin:0 0 18px;color:var(--muted);font-weight:650}

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow2);
      padding:16px 16px;
      margin-top:14px;
    }

    .topRow{
      display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    }
    .eventName{margin:0;font-size:22px;font-weight:950}
    .badge{
      display:inline-flex;align-items:center;gap:8px;
      padding:6px 10px;border-radius:999px;
      font-weight:900;font-size:12.5px;
      background:rgba(245,158,11,.14); color: #9a6400;
    }

    .meta{
      display:flex;gap:14px;flex-wrap:wrap;
      margin:10px 0 10px;color:var(--muted);font-weight:800
    }

    textarea{
      width:100%;
      min-height:90px;
      resize:vertical;
      border:1px solid rgba(15,23,42,.14);
      border-radius:12px;
      padding:11px 12px;
      outline:none;
      font-weight:650;
      background:#fff;
    }

    .actions{
      display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;
    }
    .btn{
      border:none;cursor:pointer;font-weight:950;border-radius:12px;padding:10px 14px;transition:.15s;
    }
    .approve{background:rgba(16,185,129,.16);color:var(--ok)}
    .reject{background:rgba(239,68,68,.14);color:var(--danger)}

    .empty{
      background:#fff;border:1px solid var(--line);border-radius:18px;
      box-shadow:var(--shadow2);
      padding:18px 16px;margin-top:14px;
    }
    .empty h3{margin:0 0 6px;color:var(--brand);font-weight:950}
    .empty p{margin:0;color:var(--muted);font-weight:650}
    .card a{
  color: var(--brand);
  text-decoration: none;
  font-weight: 800;
  word-break: break-word;
}
.card a:hover{
  text-decoration: underline;
}
  </style>
</head>

<body>
  <header class="nav">
    <div class="navLeft"><span>🎓</span><span>Campus Orbit</span></div>
    <div class="navRight">
      <button class="navBtn" id="goTracking">Approval Tracking</button>
      <button class="navBtn" id="goStaff">Staff Page</button>
      <a href="home.html" class="navBtn">Home</a>
      <button class="navBtn secondary" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="wrap">
    <div class="title">Principal Dashboard</div>
    <p class="sub">Review and approve pending events</p>

    <!-- ✅ This is where API pending events will render -->
    <div id="list"></div>
  </main>

  <script type="module" src="principal.js"></script>
</body>
</html>
